server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /sitemap.xml {
    proxy_pass http://gaterank-api:8787/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /publish-token-docs {
    proxy_pass http://gaterank-api:8787/publish-token-docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location = /publish-token-docs.md {
    proxy_pass http://gaterank-api:8787/publish-token-docs.md;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /news {
    proxy_pass http://gaterank-api:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /uploads/ {
    proxy_pass http://gaterank-api:8787/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
